<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatzai | Güvenli Alan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #chat-messages::-webkit-scrollbar { width: 6px; }
        #chat-messages::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans overflow-hidden">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-95 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h1 class="text-2xl font-bold mb-2 text-center text-slate-800">Sisteme Giriş</h1>
            <p class="text-slate-500 text-sm text-center mb-6">Lütfen kimliğinizi doğrulayın.</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Görünür Adınız</label>
                    <input type="text" id="username-input" placeholder="Örn: Gezgin" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Sistem Şifresi</label>
                    <input type="password" id="password-input" placeholder="Şifreyi girin..." class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg active:scale-95">
                    Giriş Yap
                </button>
                <p id="login-error" class="text-red-500 text-sm text-center hidden font-medium"></p>
            </div>
        </div>
    </div>

    <header class="bg-white shadow-sm p-4 flex justify-between items-center border-b z-10">
        <div>
            <h2 class="font-bold text-xl text-blue-600 leading-none">Chatzai</h2>
            <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-wider italic">Gelecek Çarşamba İçin Hazır</p>
        </div>
        <div id="user-display" class="text-xs bg-slate-100 px-3 py-1.5 rounded-full text-slate-600 font-semibold border">
            Bağlantı Bekleniyor...
        </div>
    </header>

    <main id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50">
        <div class="text-center text-slate-400 text-sm my-10 italic">Lütfen giriş yapın...</div>
    </main>

    <footer class="p-4 bg-white border-t">
        <div class="max-w-4xl mx-auto flex flex-col gap-3">
            <div class="flex gap-2">
                <input type="text" id="msg-input" placeholder="Mesajınızı yazın..." class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                <button id="send-btn" class="bg-blue-600 text-white px-6 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-md active:scale-90">
                    GÖNDER
                </button>
            </div>
            <div class="flex items-center justify-between">
                <label class="cursor-pointer text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full border border-blue-100">
                    Resim Seç <input type="file" id="image-input" accept="image/*" class="hidden">
                </label>
                <span id="file-name" class="text-[10px] text-slate-400 truncate max-w-[150px]"></span>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Senin verdiğin Firebase Bilgileri yerleştirildi
        const firebaseConfig = {
            apiKey: "AIzaSyB1tX9ZEFWNky53TCwbl8qsr60nuLbOtiI",
            authDomain: "chatzaisa-e12b4.firebaseapp.com",
            databaseURL: "https://chatzaisa-e12b4-default-rtdb.firebaseio.com",
            projectId: "chatzaisa-e12b4",
            storageBucket: "chatzaisa-e12b4.firebasestorage.app",
            messagingSenderId: "134148188438",
            appId: "1:134148188438:web:4151b757e96b60732f4837",
            measurementId: "G-TMHHNSTFX7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const appId = "chatzai-v1"; 
        const FIXED_PASSWORD = "TyUiLvYoU"; // Roblox profilindeki şifre

        let currentUserNickname = localStorage.getItem('chat_user') || "";

        // Giriş İşlemi
        document.getElementById('login-btn').addEventListener('click', async () => {
            const userInput = document.getElementById('username-input').value.trim();
            const passInput = document.getElementById('password-input').value;
            const error = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            if (userInput && passInput === FIXED_PASSWORD) {
                btn.disabled = true;
                btn.innerText = "Giriş Yapılıyor...";
                try {
                    await signInAnonymously(auth);
                    currentUserNickname = userInput;
                    localStorage.setItem('chat_user', userInput);
                } catch (err) {
                    error.innerText = "Firebase Hatası: " + err.message;
                    error.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = "Giriş Yap";
                }
            } else {
                error.innerText = "Şifre Yanlış veya İsim Boş!";
                error.classList.remove('hidden');
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user && currentUserNickname) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('user-display').innerText = `Kullanıcı: ${currentUserNickname}`;
                initChat();
            }
        });

        function initChat() {
            const q = query(collection(db, 'chats', appId, 'messages'), orderBy('createdAt', 'asc'), limit(50));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('chat-messages');
                container.innerHTML = '';
                snapshot.forEach(doc => renderMessage(doc.data()));
                container.scrollTop = container.scrollHeight;
            });
        }

        function renderMessage(data) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            const isMe = data.sender === currentUserNickname;
            div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-4 animate-fade-in`;
            div.innerHTML = `
                <span class="text-[9px] text-slate-400 mb-1 font-bold uppercase">${data.sender}</span>
                <div class="max-w-[85%] p-3 rounded-2xl shadow-sm ${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-slate-800 rounded-tl-none border border-slate-200'}">
                    <p class="text-sm">${data.text || ''}</p>
                    ${data.image ? `<img src="${data.image}" class="mt-2 rounded-lg max-w-full">` : ''}
                </div>`;
            container.appendChild(div);
        }

        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('msg-input');
            const imageInput = document.getElementById('image-input');
            const text = input.value.trim();
            if (!text && !imageInput.files[0]) return;

            let imageData = null;
            if (imageInput.files[0]) {
                const reader = new FileReader();
                imageData = await new Promise(r => { reader.onload = e => r(e.target.result); reader.readAsDataURL(imageInput.files[0]); });
            }

            try {
                await addDoc(collection(db, 'chats', appId, 'messages'), {
                    text, image: imageData, sender: currentUserNickname, createdAt: serverTimestamp()
                });
                input.value = ''; imageInput.value = '';
            } catch (e) {
                alert("Mesaj Gönderilemedi: " + e.message);
            }
        });

        document.getElementById('image-input').addEventListener('change', (e) => {
            document.getElementById('file-name').innerText = e.target.files[0] ? e.target.files[0].name : "";
        });
    </script>
</body>
</html>
