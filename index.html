<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonim Chat | Chatzai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        #chat-messages::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        .message-content img {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 12px;
            margin-top: 8px;
            display: block;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .link-text {
            color: #2563eb;
            text-decoration: underline;
            word-break: break-all;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans overflow-hidden">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-95 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h1 class="text-2xl font-bold mb-2 text-center text-slate-800">Sisteme Giriş</h1>
            <p class="text-slate-500 text-sm text-center mb-6">Lütfen kimliğinizi doğrulayın.</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Görünür Adınız</label>
                    <input type="text" id="username-input" placeholder="Örn: Gezgin" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Sistem Şifresi</label>
                    <input type="password" id="password-input" placeholder="Şifreyi girin..." class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <button id="login-btn" onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg active:scale-95">
                    Giriş Yap
                </button>
                <p id="login-error" class="text-red-500 text-sm text-center hidden font-medium"></p>
            </div>
        </div>
    </div>

    <header class="bg-white shadow-sm p-4 flex justify-between items-center border-b z-10">
        <div>
            <h2 class="font-bold text-xl text-blue-600 leading-none">AnonimChat</h2>
            <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-wider">Güvenli Bağlantı Aktif</p>
        </div>
        <div id="user-display" class="text-xs bg-slate-100 px-3 py-1.5 rounded-full text-slate-600 font-semibold border">
            Bağlanılıyor...
        </div>
    </header>

    <main id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50">
        <div class="text-center text-slate-400 text-sm my-10 italic">Yükleniyor...</div>
    </main>

    <footer class="p-4 bg-white border-t shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <div class="max-w-4xl mx-auto flex flex-col gap-3">
            <div class="flex gap-2 items-center">
                <input type="text" id="msg-input" placeholder="Mesajınızı buraya yazın..." class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button id="send-btn" onclick="sendMessage()" class="bg-blue-600 text-white p-3 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-md active:scale-90 disabled:opacity-50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
            <div class="flex items-center justify-between px-1">
                <div class="flex items-center gap-2">
                    <label for="image-input" class="cursor-pointer text-xs font-bold text-blue-600 hover:text-blue-800 flex items-center gap-1 bg-blue-50 px-3 py-1 rounded-full border border-blue-100 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        Resim Ekle
                    </label>
                    <input type="file" id="image-input" accept="image/*" class="hidden">
                    <span id="file-name" class="text-[10px] text-slate-400 truncate max-w-[100px]"></span>
                </div>
                <div id="status-msg" class="text-[10px] text-red-500 font-bold hidden">Hata oluştu!</div>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config (Kendi bilgilerinle doldurmalısın)
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Veritabanı klasör adı
        const appId = "chatzai-private-v1"; 

        const FIXED_PASSWORD = "TyUiLvYoU";
        let currentUserNickname = localStorage.getItem('chat_user') || "";

        // Dosya ismi gösterici
        document.getElementById('image-input').addEventListener('change', (e) => {
            const fileName = e.target.files[0] ? e.target.files[0].name : "";
            document.getElementById('file-name').innerText = fileName;
        });

        // Login İşlemi
        window.handleLogin = async () => {
            const userInput = document.getElementById('username-input').value.trim();
            const passInput = document.getElementById('password-input').value;
            const error = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            if (userInput && passInput === FIXED_PASSWORD) {
                btn.disabled = true;
                btn.innerText = "Bağlanılıyor...";
                
                try {
                    await signInAnonymously(auth);
                    currentUserNickname = userInput;
                    localStorage.setItem('chat_user', userInput);
                } catch (err) {
                    error.innerText = "Bağlantı hatası: " + err.message;
                    error.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = "Giriş Yap";
                }
            } else {
                error.innerText = "Hatalı şifre veya isim boş!";
                error.classList.remove('hidden');
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user && currentUserNickname) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('user-display').innerText = `Aktif: ${currentUserNickname}`;
                initChat();
            }
        });

        function initChat() {
            const messagesRef = collection(db, 'chats', appId, 'messages');
            const q = query(messagesRef, orderBy('createdAt', 'asc'), limit(50));

            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('chat-messages');
                container.innerHTML = '';
                
                if (snapshot.empty) {
                    container.innerHTML = '<div class="text-center text-slate-400 text-sm my-10 italic">Henüz mesaj yok. İlk mesajı sen yazarak sessizliği boz!</div>';
                    return;
                }

                snapshot.forEach(doc => {
                    renderMessage(doc.data());
                });
                
                container.scrollTop = container.scrollHeight;
            });
        }

        function formatText(text) {
            if (!text) return "";
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, (url) => `<a href="${url}" target="_blank" class="link-text">${url}</a>`);
        }

        function renderMessage(data) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            const isMe = data.sender === currentUserNickname;

            div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-4 w-full animate-fade-in`;
            
            let contentHtml = `<p class="text-sm leading-relaxed break-words">${formatText(data.text || '')}</p>`;
            if (data.image) {
                contentHtml += `<img src="${data.image}" loading="lazy" class="mt-2 border rounded-lg max-w-full h-auto">`;
            }

            div.innerHTML = `
                <span class="text-[9px] text-slate-400 mb-1 px-2 font-bold uppercase tracking-tighter">${data.sender}</span>
                <div class="max-w-[85%] p-3.5 rounded-2xl shadow-sm ${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-slate-800 rounded-tl-none border border-slate-200'}">
                    <div class="message-content">${contentHtml}</div>
                </div>
            `;
            container.appendChild(div);
        }

        window.sendMessage = async () => {
            const input = document.getElementById('msg-input');
            const imageInput = document.getElementById('image-input');
            const sendBtn = document.getElementById('send-btn');
            
            const text = input.value.trim();
            if (!text && !imageInput.files[0]) return;

            sendBtn.disabled = true;

            try {
                let imageData = null;
                if (imageInput.files[0]) {
                    imageData = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsDataURL(imageInput.files[0]);
                    });
                }

                const messagesRef = collection(db, 'chats', appId, 'messages');
                await addDoc(messagesRef, {
                    text: text,
                    image: imageData,
                    sender: currentUserNickname,
                    createdAt: serverTimestamp()
                });

                input.value = '';
                imageInput.value = '';
                document.getElementById('file-name').innerText = '';
            } catch (e) {
                console.error(e);
                alert("Mesaj iletilemedi!");
            } finally {
                sendBtn.disabled = false;
            }
        };

        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.sendMessage();
        });
    </script>
</body>
</html>
