<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonim Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        #chat-messages::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        .message-content img {
            max-width: 250px;
            max-height: 250px;
            object-fit: contain;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
            background: #eee;
        }
        .link-text {
            color: #3b82f6;
            text-decoration: underline;
            word-break: break-all;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans">

    <!-- Giriş Ekranı -->
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-90 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h1 class="text-2xl font-bold mb-6 text-center text-slate-800">Sisteme Giriş</h1>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Görünür Adınız</label>
                    <input type="text" id="username-input" placeholder="Örn: Gezgin" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Sistem Şifresi</label>
                    <input type="password" id="password-input" placeholder="Şifreyi girin..." class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button id="login-btn" onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors">
                    Giriş Yap
                </button>
                <p id="login-error" class="text-red-500 text-sm text-center hidden">Hatalı şifre veya bağlantı sorunu!</p>
            </div>
        </div>
    </div>

    <!-- Ana Chat Ekranı -->
    <header class="bg-white shadow-sm p-4 flex justify-between items-center border-b">
        <h2 class="font-bold text-xl text-blue-600">AnonimChat</h2>
        <div id="user-display" class="text-sm text-slate-500 font-medium">Bağlanılıyor...</div>
    </header>

    <main id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="text-center text-slate-400 text-sm my-10">Lütfen giriş yapın...</div>
    </main>

    <footer class="p-4 bg-white border-t">
        <div class="max-w-4xl mx-auto flex flex-col gap-2">
            <div id="status-msg" class="text-[10px] text-red-500 hidden">Mesaj gönderilemedi, tekrar deneyin.</div>
            <div class="flex gap-2">
                <input type="text" id="msg-input" placeholder="Bir şeyler yazın veya link yapıştırın..." class="flex-1 p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <button id="send-btn" onclick="sendMessage()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700 transition-all disabled:opacity-50">Gönder</button>
            </div>
            <div class="flex items-center gap-2">
                <label class="text-xs font-semibold text-slate-500">Resim Seç:</label>
                <input type="file" id="image-input" accept="image/*" class="text-xs text-slate-500 file:mr-4 file:py-1 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
        </div>
    </footer>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'chat-app-99';

        const FIXED_PASSWORD = "TyUiLvYoU";
        let currentUserNickname = "";
        let isAuthReady = false;

        // Login İşlemi
        window.handleLogin = async () => {
            const user = document.getElementById('username-input').value.trim();
            const pass = document.getElementById('password-input').value;
            const error = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            if (user && pass === FIXED_PASSWORD) {
                btn.disabled = true;
                btn.innerText = "Bağlanılıyor...";
                currentUserNickname = user;

                try {
                    // Önce kimlik doğrulaması
                    if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                        await signInWithCustomToken(auth, window.__initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (err) {
                    console.error("Auth hatası:", err);
                    error.innerText = "Bağlantı kurulamadı: " + err.message;
                    error.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = "Giriş Yap";
                }
            } else {
                error.innerText = "Hatalı şifre veya kullanıcı adı boş!";
                error.classList.remove('hidden');
            }
        };

        // Auth durumunu takip et
        onAuthStateChanged(auth, (user) => {
            if (user && currentUserNickname) {
                isAuthReady = true;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('user-display').innerText = `Kullanıcı: ${currentUserNickname}`;
                initChat();
            }
        });

        // Chat Başlat
        function initChat() {
            const messagesRef = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
            const q = query(messagesRef, orderBy('createdAt', 'desc'), limit(10));

            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('chat-messages');
                container.innerHTML = '';
                
                const docs = [...snapshot.docs].reverse();
                
                if (docs.length === 0) {
                    container.innerHTML = '<div class="text-center text-slate-400 text-sm my-10">Henüz mesaj yok. İlk mesajı sen yaz!</div>';
                }

                docs.forEach(doc => {
                    renderMessage(doc.data());
                });
                container.scrollTop = container.scrollHeight;
            }, (err) => {
                console.error("Dinleme hatası:", err);
            });
        }

        // Linkleri Tıklanabilir Yap
        function formatText(text) {
            if (!text) return "";
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, (url) => {
                return `<a href="${url}" target="_blank" class="link-text">${url}</a>`;
            });
        }

        function renderMessage(data) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            const isMe = data.sender === currentUserNickname;

            div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-4`;
            
            let contentHtml = `<p class="text-sm break-words">${formatText(data.text || '')}</p>`;
            if (data.image) {
                contentHtml += `<img src="${data.image}" alt="Resim" class="mt-2 shadow-sm border">`;
            }

            div.innerHTML = `
                <span class="text-[10px] text-slate-400 mb-1 px-1 font-bold">${data.sender}</span>
                <div class="max-w-[85%] p-3 rounded-2xl shadow-sm ${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-slate-800 rounded-tl-none border border-slate-200'}">
                    <div class="message-content">${contentHtml}</div>
                </div>
            `;
            container.appendChild(div);
        }

        // Mesaj Gönder
        window.sendMessage = async () => {
            if (!isAuthReady) return;

            const input = document.getElementById('msg-input');
            const imageInput = document.getElementById('image-input');
            const sendBtn = document.getElementById('send-btn');
            const statusMsg = document.getElementById('status-msg');
            
            const text = input.value.trim();
            let imageData = null;

            if (!text && !imageInput.files[0]) return;

            sendBtn.disabled = true;
            statusMsg.classList.add('hidden');

            try {
                // Resim işleme
                if (imageInput.files[0]) {
                    const reader = new FileReader();
                    imageData = await new Promise((resolve, reject) => {
                        reader.onload = (e) => resolve(e.target.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(imageInput.files[0]);
                    });
                }

                const messagesRef = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
                await addDoc(messagesRef, {
                    text: text,
                    image: imageData,
                    sender: currentUserNickname,
                    createdAt: serverTimestamp(),
                    userId: auth.currentUser.uid
                });

                input.value = '';
                imageInput.value = '';
            } catch (e) {
                console.error("Gönderme Hatası:", e);
                statusMsg.classList.remove('hidden');
                statusMsg.innerText = "Hata: " + e.message;
            } finally {
                sendBtn.disabled = false;
            }
        };

        // Klavye desteği
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.sendMessage();
        });
    </script>
</body>
</html>
