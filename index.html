<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatzai | Güvenli Mesajlaşma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #chat-messages::-webkit-scrollbar { width: 6px; }
        #chat-messages::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .hidden-panel { display: none; }
        .active-panel { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans overflow-hidden">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-95 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h1 class="text-2xl font-bold mb-2 text-center text-slate-800">Sisteme Giriş</h1>
            <p class="text-slate-500 text-sm text-center mb-6">Lütfen kimliğinizi doğrulayın.</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Görünür Adınız</label>
                    <input type="text" id="username-input" placeholder="Örn: Gezgin" class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Sistem Şifresi</label>
                    <input type="password" id="password-input" placeholder="Şifreyi girin..." class="w-full p-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all">
                    Giriş Yap
                </button>
                <p id="login-error" class="text-red-500 text-sm text-center hidden font-medium"></p>
            </div>
        </div>
    </div>

    <div id="secure-vault" class="hidden-panel fixed inset-0 z-40 items-center justify-center bg-black bg-opacity-80 p-6">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-xs text-center">
            <h3 class="font-bold text-slate-800 mb-2">Güvenli Bölge</h3>
            <p class="text-xs text-slate-500 mb-4">Lütfen yazarın soyadını girin ("ç" kullanarak).</p>
            <input type="text" id="vault-key" placeholder="Soyadı giriniz..." class="w-full p-2 border rounded-lg mb-4 outline-none focus:border-blue-500 text-center">
            <div id="vault-display" class="hidden font-mono text-lg font-bold text-blue-700 bg-blue-50 p-3 rounded-xl mb-4 border border-blue-200">
                +90 530 760 42 23
                <div id="timer" class="text-[10px] text-red-500 mt-1 italic">10s içinde kapanacak</div>
            </div>
            <button id="vault-check-btn" class="w-full bg-slate-800 text-white py-2 rounded-lg text-sm font-bold">Doğrula</button>
            <button id="vault-close-btn" class="mt-4 text-xs text-slate-400 underline">Kapat</button>
        </div>
    </div>

    <header class="bg-white shadow-sm p-4 flex justify-between items-center border-b z-10">
        <div class="flex items-center gap-3">
            <div>
                <h2 class="font-bold text-xl text-blue-600 leading-none">Chatzai</h2>
                <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-wider">Bağlantı Şifreli</p>
            </div>
            <button id="open-vault-btn" class="bg-slate-100 p-2 rounded-lg hover:bg-blue-50 transition-colors border">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </button>
        </div>
        <div id="user-display" class="text-xs bg-slate-100 px-3 py-1.5 rounded-full text-slate-600 font-semibold border italic">Yükleniyor...</div>
    </header>

    <main id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50">
        <div class="text-center text-slate-400 text-sm my-10 italic">Mesajlar yükleniyor...</div>
    </main>

    <footer class="p-4 bg-white border-t">
        <div class="max-w-4xl mx-auto flex flex-col gap-3">
            <div class="flex gap-2">
                <input type="text" id="msg-input" placeholder="Bir şeyler yaz..." class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                <button id="send-btn" class="bg-blue-600 text-white px-6 rounded-2xl font-bold hover:bg-blue-700 active:scale-90 transition-all">GÖNDER</button>
            </div>
            <div class="flex items-center justify-between">
                <label class="cursor-pointer text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full border border-blue-100">
                    Resim Seç <input type="file" id="image-input" accept="image/*" class="hidden">
                </label>
                <span id="file-name" class="text-[10px] text-slate-400 truncate max-w-[150px]"></span>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1tX9ZEFWNky53TCwbl8qsr60nuLbOtiI",
            authDomain: "chatzaisa-e12b4.firebaseapp.com",
            databaseURL: "https://chatzaisa-e12b4-default-rtdb.firebaseio.com",
            projectId: "chatzaisa-e12b4",
            storageBucket: "chatzaisa-e12b4.firebasestorage.app",
            messagingSenderId: "134148188438",
            appId: "1:134148188438:web:4151b757e96b60732f4837"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        const FIXED_PASSWORD = "TyUiLvYoU";
        const VAULT_KEY = "Lafçı";
        let currentUserNickname = localStorage.getItem('chat_user') || "";

        // Giriş İşlemi
        document.getElementById('login-btn').addEventListener('click', async () => {
            const user = document.getElementById('username-input').value.trim();
            const pass = document.getElementById('password-input').value;
            const error = document.getElementById('login-error');

            if (user && pass === FIXED_PASSWORD) {
                try {
                    await signInAnonymously(auth);
                    currentUserNickname = user;
                    localStorage.setItem('chat_user', user);
                } catch (e) { error.innerText = "Hata!"; error.classList.remove('hidden'); }
            } else {
                error.innerText = "Şifre Yanlış!"; error.classList.remove('hidden');
            }
        });

        // Güvenli Panel (Vault) Mantığı
        const vaultPanel = document.getElementById('secure-vault');
        const vaultInput = document.getElementById('vault-key');
        const vaultDisplay = document.getElementById('vault-display');
        const timerEl = document.getElementById('timer');

        document.getElementById('open-vault-btn').addEventListener('click', () => {
            vaultPanel.classList.replace('hidden-panel', 'active-panel');
        });

        document.getElementById('vault-close-btn').addEventListener('click', () => {
            closeVault();
        });

        document.getElementById('vault-check-btn').addEventListener('click', () => {
            if (vaultInput.value.trim() === VAULT_KEY) {
                vaultInput.classList.add('hidden');
                document.getElementById('vault-check-btn').classList.add('hidden');
                vaultDisplay.classList.remove('hidden');
                
                let timeLeft = 10;
                const countdown = setInterval(() => {
                    timeLeft--;
                    timerEl.innerText = `${timeLeft}s içinde kapanacak`;
                    if (timeLeft <= 0) {
                        clearInterval(countdown);
                        closeVault();
                    }
                }, 1000);
            } else {
                alert("Hatalı Soyadı!");
            }
        });

        function closeVault() {
            vaultPanel.classList.replace('active-panel', 'hidden-panel');
            vaultDisplay.classList.add('hidden');
            vaultInput.classList.remove('hidden');
            document.getElementById('vault-check-btn').classList.remove('hidden');
            vaultInput.value = "";
        }

        onAuthStateChanged(auth, (user) => {
            if (user && currentUserNickname) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('user-display').innerText = `Kullanıcı: ${currentUserNickname}`;
                startListening();
            }
        });

        function startListening() {
            const messagesRef = ref(db, 'messages');
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            onChildAdded(messagesRef, (snapshot) => { renderMessage(snapshot.val()); });
        }

        function renderMessage(data) {
            const container = document.getElementById('chat-messages');
            const isMe = data.sender === currentUserNickname;
            const div = document.createElement('div');
            div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-4`;
            div.innerHTML = `
                <span class="text-[9px] text-slate-400 mb-1 font-bold">${data.sender}</span>
                <div class="max-w-[85%] p-3 rounded-2xl ${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-slate-800 border rounded-tl-none shadow-sm'}">
                    <p class="text-sm">${data.text || ''}</p>
                    ${data.image ? `<img src="${data.image}" class="mt-2 rounded-lg max-w-full shadow-sm border">` : ''}
                </div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('msg-input');
            const file = document.getElementById('image-input').files[0];
            const text = input.value.trim();
            if (!text && !file) return;

            let imageData = null;
            if (file) {
                const reader = new FileReader();
                imageData = await new Promise(r => { reader.onload = e => r(e.target.result); reader.readAsDataURL(file); });
            }

            const messagesRef = ref(db, 'messages');
            await set(push(messagesRef), {
                text, sender: currentUserNickname, image: imageData, timestamp: serverTimestamp()
            });
            input.value = '';
            document.getElementById('image-input').value = '';
            document.getElementById('file-name').innerText = '';
        });

        document.getElementById('image-input').addEventListener('change', (e) => {
            document.getElementById('file-name').innerText = e.target.files[0] ? e.target.files[0].name : "";
        });
    </script>
</body>
</html>
